<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simon Says Game</title>
  <!-- Google Fonts for Modern Typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <!-- Stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="game-container">
    <header class="game-header">
      <h1>Simon Says</h1>
      <h2 id="status-heading">Press any key to start</h2>
      <p class="score-display">High Score: <span id="high-score">0</span></p>
    </header>

    <main class="game-board">
      <button class="simon-btn red" id="red" aria-label="Red Button"></button>
      <button class="simon-btn green" id="green" aria-label="Green Button"></button>
      <button class="simon-btn blue" id="blue" aria-label="Blue Button"></button>
      <button class="simon-btn yellow" id="yellow" aria-label="Yellow Button"></button>
    </main>

    <footer class="game-footer">
      <p>Watch the pattern. Repeat the sequence. How far can you go?</p>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
